<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Candidate Results</h2>

<table border="1" cellpadding="10">
  <tr>
    <th>Email</th>
    <th>Test Type</th>
    <th>Language</th>
    <th>Answer</th>
    <th>Score</th>
  </tr>

  {% for row in data %}
  <tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
  </tr>
  {% endfor %}

</table>

</body>
</html>
