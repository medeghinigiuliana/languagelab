<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
      background: white;
      color: black;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #6366f1;
      color: white;
      padding: 12px;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #e2e8f0;
      font-size: 13px;
    }

    tr:hover {
      background: #f1f5f9;
    }

    .score {
      font-weight: bold;
      color: #16a34a;
    }
  </style>
</head>

<body>

  <h1>📊 Candidate Dashboard</h1>

  <table>
    <tr>
      <th>Email</th>
      <th>Test</th>
      <th>Language</th>
      <th>Answers</th>
      <th>Score</th>
    </tr>

    {% for row in data %}
    <tr>
      <td>{{ row[0] }}</td>
      <td>{{ row[1] }}</td>
      <td>{{ row[2] }}</td>
      <td style="white-space: pre-wrap;">{{ row[3] }}</td>
      <td class="score">{{ row[4] }}</td>
    </tr>
    {% endfor %}

  </table>

</body>
</html>
