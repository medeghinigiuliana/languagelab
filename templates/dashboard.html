<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0b0f19;
  color: #e5e7eb;
  padding: 20px;
}

h2 {
  text-align: center;
  margin-top: 10px;
}

.top {
  text-align: center;
  margin-bottom: 25px;
}

button {
  background: linear-gradient(135deg, #6366f1, #4f46e5);
  border: none;
  padding: 10px 16px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #111827;
  border-radius: 10px;
  overflow: hidden;
}

th {
  background: #1f2937;
  padding: 12px;
}

td {
  padding: 12px;
  border-top: 1px solid #1f2937;
}

tr:hover td {
  background: #0f172a;
}
</style>

</head>

<body>

<div class="top">
  <img src="{{ url_for('static', filename='images/logo.png') }}"
       style="height:90px; object-fit:contain;">

  <h2>Candidate Dashboard</h2>

  <a href="/export?password=admin123">
    <button>Download CSV</button>
  </a>
</div>

<table>

<tr>
<th>Email</th>
<th>Test</th>
<th>Language</th>
<th>Answers</th>
<th>Translation</th>
<th>Interpretation</th>
<th>Status</th>
</tr>

{% for r in data %}
<tr>
<td>{{r[0]}}</td>
<td>{{r[1]}}</td>
<td>{{r[2]}}</td>
<td>{{r[3]}}</td>

<td>{{r[4]|safe}}</td>
<td>{{r[5]|safe}}</td>

<td>
{% if r[6]=="PASS" %}
<span style="background:#065f46; color:#34d399; padding:4px 8px; border-radius:6px; font-weight:bold;">
PASS
</span>
{% else %}
<span style="background:#7f1d1d; color:#f87171; padding:4px 8px; border-radius:6px; font-weight:bold;">
FAIL
</span>
{% endif %}
</td>

</tr>
{% endfor %}

</table>

</body>
</html>
