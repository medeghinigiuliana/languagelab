<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Results</h2>

<table border="1">
<tr>
  <th>Email</th>
  <th>Test</th>
  <th>Language</th>
  <th>Answers</th>
  <th>Translation Score</th>
  <th>Interpretation Score</th>
</tr>

{% for row in data %}
<tr>
  <td>{{ row[0] }}</td>
  <td>{{ row[1] }}</td>
  <td>{{ row[2] }}</td>
  <td>{{ row[3] }}</td>

  <td>{{ row[4].replace('\n','<br>')|safe if row[4] else "-" }}</td>
  <td>{{ row[5].replace('\n','<br>')|safe if row[5] else "-" }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
