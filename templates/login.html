<!DOCTYPE html>
<html>
<head>
  <title>NovoxLab Login</title>

  <style>
    body {
      background: #0b0f19;
      color: #e5e7eb;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #020617;
      border: 1px solid #1f2937;
      padding: 40px;
      border-radius: 14px;
      width: 360px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }

    .logo {
      height: 60px;
      margin-bottom: 15px;
    }

    h2 {
      margin-bottom: 25px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      background: #020617;
      border: 1px solid #374151;
      color: white;
      border-radius: 8px;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 1px #6366f1;
    }

    .button {
      width: 100%;
      background: #6366f1;
      color: white;
      padding: 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .button:hover {
      background: #4f46e5;
    }

    .error {
      background: #7f1d1d;
      color: #fecaca;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>

<body>

<div class="card">

  <img class="logo" src="{{ url_for('static', filename='images/logo.png') }}">

  <h2>Recruiter Login</h2>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <input 
      name="username" 
      placeholder="Username" 
      required 
      value="{{ request.form.get('username', '') }}"
    >

    <input 
      name="password" 
      type="password" 
      placeholder="Password" 
      required
    >

    <button type="submit" class="button">Login</button>
  </form>

  <div class="footer">
    NovoxLab • Candidate Evaluation Platform
  </div>

</div>

</body>
</html>
