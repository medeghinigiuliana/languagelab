<!DOCTYPE html>
<html>
<head>
  <title>Novox Lab</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
    }

    .section {
      margin-top: 25px;
      padding: 20px;
      background: #020617;
      border-left: 4px solid #6366f1;
      border-radius: 10px;
    }

    .locked {
      opacity: 0.4;
      pointer-events: none;
    }

    .plays {
      font-size: 13px;
      opacity: 0.8;
    }

    button {
      margin-top: 10px;
    }

    .timer {
      font-weight: bold;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="container">

<h2>Novox Lab - Interpretation Test</h2>

<form method="POST" action="/submit">

<!-- AUDIO 1 -->
<div class="section" id="section1">
  <h3>Audio 1</h3>
  <audio id="audio1" controls controlsList="nodownload" oncontextmenu="return false;">
    <source src="{{ url_for('static', filename='audio/audio1.mp3') }}">
  </audio>
  <p id="count1" class="plays">Plays left: 2</p>
  <p id="timer1" class="timer">Time left: 10s</p>

  <button type="button" onclick="startRecording(1)">Start</button>
  <button type="button" onclick="stopRecording(1)">Stop</button>

  <p id="status1"></p>
  <input type="hidden" name="audio1" id="audioData1">
</div>

<!-- AUDIO 2 -->
<div class="section locked" id="section2">
  <h3>Audio 2</h3>
  <audio id="audio2" controls controlsList="nodownload" oncontextmenu="return false;">
    <source src="{{ url_for('static', filename='audio/audio2.mp3') }}">
  </audio>
  <p id="count2" class="plays">Plays left: 2</p>
  <p id="timer2" class="timer">Time left: 10s</p>

  <button type="button" onclick="startRecording(2)">Start</button>
  <button type="button" onclick="stopRecording(2)">Stop</button>

  <p id="status2"></p>
  <input type="hidden" name="audio2" id="audioData2">
</div>

<!-- AUDIO 3 -->
<div class="section locked" id="section3">
  <h3>Audio 3</h3>
  <audio id="audio3" controls controlsList="nodownload" oncontextmenu="return false;">
    <source src="{{ url_for('static', filename='audio/audio3.mp3') }}">
  </audio>
  <p id="count3" class="plays">Plays left: 2</p>
  <p id="timer3" class="timer">Time left: 10s</p>

  <button type="button" onclick="startRecording(3)">Start</button>
  <button type="button" onclick="stopRecording(3)">Stop</button>

  <p id="status3"></p>
  <input type="hidden" name="audio3" id="audioData3">
</div>

<!-- AUDIO 4 -->
<div class="section locked" id="section4">
  <h3>Audio 4</h3>
  <audio id="audio4" controls controlsList="nodownload" oncontextmenu="return false;">
    <source src="{{ url_for('static', filename='audio/audio4.mp3') }}">
  </audio>
  <p id="count4" class="plays">Plays left: 2</p>
  <p id="timer4" class="timer">Time left: 10s</p>

  <button type="button" onclick="startRecording(4)">Start</button>
  <button type="button" onclick="stopRecording(4)">Stop</button>

  <p id="status4"></p>
  <input type="hidden" name="audio4" id="audioData4">
</div>

<br>
<button type="submit">Submit</button>

</form>

</div>

<script>

// --------------------
// SETTINGS
// --------------------
const MAX_PLAYS = 2;
const TIME_LIMIT = 10;

// --------------------
// STATE
// --------------------
let playCount = {1:0,2:0,3:0,4:0};
let isRecording = false;
let timers = {};
let timeLeft = {1:10,2:10,3:10,4:10};
let recorders = {};
let chunks = {};

// --------------------
// PLAY LIMIT
// --------------------
function attachPlayLimit(id){
  const audio = document.getElementById("audio"+id);

  audio.addEventListener("play", () => {

    if(isRecording){
      audio.pause();
      alert("Cannot play audio while recording");
      return;
    }

    if(playCount[id] >= MAX_PLAYS){
      audio.pause();
      audio.currentTime = 0;
      alert("Max plays reached (2)");
      return;
    }

    playCount[id]++;
    document.getElementById("count"+id).innerText =
      "Plays left: " + (MAX_PLAYS - playCount[id]);
  });
}

[1,2,3,4].forEach(attachPlayLimit);

// --------------------
// TIMER
// --------------------
function startTimer(id){
  timeLeft[id] = TIME_LIMIT;

  timers[id] = setInterval(()=>{
    timeLeft[id]--;

    let el = document.getElementById("timer"+id);
    el.innerText = "Time left: " + timeLeft[id] + "s";

    if(timeLeft[id] <= 3){
      el.style.color = "red";
    }

    if(timeLeft[id] <= 0){
      clearInterval(timers[id]);
      stopRecording(id);
    }

  },1000);
}

// --------------------
// RECORDING
// --------------------
async function startRecording(id){
  isRecording = true;

  startTimer(id);

  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  recorders[id] = new MediaRecorder(stream);
  chunks[id] = [];

  document.getElementById("status"+id).innerText = "🔴 Recording...";

  recorders[id].ondataavailable = e => chunks[id].push(e.data);

  recorders[id].onstop = () => {
    isRecording = false;
    clearInterval(timers[id]);

    const blob = new Blob(chunks[id], {type:"audio/webm"});
    const reader = new FileReader();

    reader.readAsDataURL(blob);
    reader.onloadend = () => {
      document.getElementById("audioData"+id).value = reader.result;
    };

    document.getElementById("status"+id).innerText = "✅ Saved";

    unlockNext(id);
  };

  recorders[id].start();
}

function stopRecording(id){
  if(recorders[id]){
    recorders[id].stop();
  }
}

// --------------------
// LOCK FLOW + AUTOPLAY
// --------------------
function unlockNext(id){
  const next = id + 1;

  if(next <= 4){
    document.getElementById("section"+next).classList.remove("locked");

    const nextAudio = document.getElementById("audio"+next);
    nextAudio.play();
  }
}

</script>

</body>
</html>
