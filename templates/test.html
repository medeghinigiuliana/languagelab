<!DOCTYPE html>

<head>

      color: white;

    input, select, textarea {
      width: 100%;

      margin-top: 10px;
      border-radius: 8px;

    }

<script>
let recorders = {};
let chunks = {};

function showTest() {
  let type = document.getElementById("testType").value;

  document.getElementById("interpretationTest").style.display =
    (type === "interpretation" || type === "both") ? "block" : "none";
}

async function startRecording(id) {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  recorders[id] = new MediaRecorder(stream);
  chunks[id] = [];

  recorders[id].ondataavailable = e => chunks[id].push(e.data);

  recorders[id].onstop = () => {
    const blob = new Blob(chunks[id], { type: 'audio/webm' });
    const url = URL.createObjectURL(blob);

    document.getElementById("playback" + id).src = url;

    const reader = new FileReader();
    reader.readAsDataURL(blob);
    reader.onloadend = () => {
      document.getElementById("audioData" + id).value = reader.result;
    };
  };

  recorders[id].start();
}

function stopRecording(id) {
  recorders[id].stop();
}
</script>
