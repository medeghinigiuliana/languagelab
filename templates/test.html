<!DOCTYPE html>
<html>
<head>
  <title>Novox Lab</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #020617;
      color: white;
    }

    textarea {
      min-height: 120px;
    }

    .section {
      margin-top: 25px;
      padding: 20px;
      background: #020617;
      border-left: 4px solid #6366f1;
      border-radius: 10px;
    }

    .button {
      margin-top: 25px;
      background: #6366f1;
      padding: 14px;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .recording {
      font-weight: bold;
      margin-top: 10px;
    }

    .plays {
      font-size: 13px;
      opacity: 0.7;
      margin-top: 5px;
    }

    .language-box {
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Novox Lab</h2>

  <form method="POST" action="/submit">

    <input name="email" placeholder="Your email" required>

    <select name="test_type" id="testType" onchange="showTest()" required>
      <option value="">Select Test Type</option>
      <option value="translation">Translation</option>
      <option value="interpretation">Interpretation</option>
      <option value="both">Both</option>
    </select>

    <div class="language-box">
      <input type="text" id="languageSearch" placeholder="Search language..." onkeyup="filterLanguages()">

      <select name="language" id="languageSelect" size="5" required>
        <option>Spanish</option>
        <option>English</option>
        <option>French</option>
        <option>Arabic</option>
        <option>Portuguese</option>
        <option>Russian</option>
        <option>Hindi</option>
      </select>
    </div>

    <!-- INTERPRETATION -->
    <div id="interpretationTest" style="display:none;">

      <!-- AUDIO BLOCK TEMPLATE -->
      <div class="section">
        <h3>Audio 1</h3>
        <audio id="testAudio1" controls controlsList="nodownload" oncontextmenu="return false;">
          <source src="{{ url_for('static', filename='audio/audio1.mp3') }}">
        </audio>
        <p id="testAudio1-count" class="plays">Plays left: 2</p>

        <button type="button" onclick="startRecording(1)">Start</button>
        <button type="button" onclick="stopRecording(1)">Stop</button>

        <p id="recordingStatus1" class="recording"></p>
        <audio id="playback1"></audio>
        <input type="hidden" name="audio1" id="audioData1">
      </div>

      <!-- Repeat for all audios -->

      <div class="section">
        <h3>Audio 2</h3>
        <audio id="testAudio2" controls controlsList="nodownload" oncontextmenu="return false;">
          <source src="{{ url_for('static', filename='audio/audio2.mp3') }}">
        </audio>
        <p id="testAudio2-count" class="plays">Plays left: 2</p>

        <button type="button" onclick="startRecording(2)">Start</button>
        <button type="button" onclick="stopRecording(2)">Stop</button>

        <p id="recordingStatus2" class="recording"></p>
        <audio id="playback2"></audio>
        <input type="hidden" name="audio2" id="audioData2">
      </div>

      <div class="section">
        <h3>Audio 3</h3>
        <audio id="testAudio3" controls controlsList="nodownload" oncontextmenu="return false;">
          <source src="{{ url_for('static', filename='audio/audio3.mp3') }}">
        </audio>
        <p id="testAudio3-count" class="plays">Plays left: 2</p>

        <button type="button" onclick="startRecording(3)">Start</button>
        <button type="button" onclick="stopRecording(3)">Stop</button>

        <p id="recordingStatus3" class="recording"></p>
        <audio id="playback3"></audio>
        <input type="hidden" name="audio3" id="audioData3">
      </div>

      <div class="section">
        <h3>Audio 4</h3>
        <audio id="testAudio4" controls controlsList="nodownload" oncontextmenu="return false;">
          <source src="{{ url_for('static', filename='audio/audio4.mp3') }}">
        </audio>
        <p id="testAudio4-count" class="plays">Plays left: 2</p>

        <button type="button" onclick="startRecording(4)">Start</button>
        <button type="button" onclick="stopRecording(4)">Stop</button>

        <p id="recordingStatus4" class="recording"></p>
        <audio id="playback4"></audio>
        <input type="hidden" name="audio4" id="audioData4">
      </div>

    </div>

    <button class="button">Submit</button>

  </form>

</div>

<script>
function showTest() {
  let type = document.getElementById("testType").value;

  document.getElementById("interpretationTest").style.display =
    (type === "interpretation" || type === "both") ? "block" : "none";
}

function filterLanguages() {
  let input = document.getElementById("languageSearch").value.toLowerCase();
  let options = document.getElementById("languageSelect").options;

  for (let i = 0; i < options.length; i++) {
    let txt = options[i].text.toLowerCase();
    options[i].style.display = txt.includes(input) ? "" : "none";
  }
}

// 🔒 AUDIO CONTROL
const MAX_PLAYS = 2;
let playCounts = {
  testAudio1: 0,
  testAudio2: 0,
  testAudio3: 0,
  testAudio4: 0
};

let isRecording = false;

function attachLimit(id) {
  const audio = document.getElementById(id);
  const counter = document.getElementById(id + "-count");

  audio.addEventListener("play", () => {

    if (isRecording) {
      audio.pause();
      alert("You cannot play audio while recording.");
      return;
    }

    if (playCounts[id] >= MAX_PLAYS) {
      audio.pause();
      audio.currentTime = 0;
      alert("Maximum plays reached (2).");
      return;
    }

    playCounts[id]++;
    counter.innerText = "Plays left: " + (MAX_PLAYS - playCounts[id]);
  });
}

["testAudio1","testAudio2","testAudio3","testAudio4"].forEach(attachLimit);

// 🎤 RECORDING
let recorders = {};
let chunks = {};

async function startRecording(id) {
  isRecording = true;

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  recorders[id] = new MediaRecorder(stream);
  chunks[id] = [];

  let indicator = document.getElementById("recordingStatus" + id);
  indicator.innerText = "🔴 Recording...";
  indicator.style.color = "red";

  recorders[id].ondataavailable = e => chunks[id].push(e.data);

  recorders[id].onstop = () => {
    isRecording = false;

    const blob = new Blob(chunks[id], { type: 'audio/webm' });
    const url = URL.createObjectURL(blob);

    let playback = document.getElementById("playback" + id);
    playback.src = url;
    playback.controls = true;

    const reader = new FileReader();
    reader.readAsDataURL(blob);
    reader.onloadend = () => {
      document.getElementById("audioData" + id).value = reader.result;
    };

    indicator.innerText = "✅ Recording saved";
    indicator.style.color = "lightgreen";
  };

  recorders[id].start();
}

function stopRecording(id) {
  recorders[id].stop();
}
</script>

</body>
</html>
